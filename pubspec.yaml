name: sps_app
description: "Smart Parking System - Offline parking management app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  intl: ^0.20.1
  uuid: ^4.5.1
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  http: ^1.2.0
  fl_chart: ^0.69.2
  flutter_slidable: ^3.1.2
  pdf: ^3.11.1
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
